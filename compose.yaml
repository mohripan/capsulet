services:
  postgres:
    image: postgres:16-alpine
    container_name: capsulet-postgres
    environment:
      POSTGRES_DB: capsulet
      POSTGRES_USER: capsulet
      POSTGRES_PASSWORD: capsulet
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capsulet -d capsulet"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - capsulet-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: capsulet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: capsulet
      MINIO_ROOT_PASSWORD: capsuletpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - capsulet-minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: capsulet-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 capsulet capsuletpassword; do
          sleep 2
        done
        mc mb --ignore-existing local/capsulet-artifacts

  smtp:
    image: axllent/mailpit:v1.20
    container_name: capsulet-smtp
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: crates/Dockerfile
      args:
        PACKAGE: capsulet-api
        BIN: capsulet-api
    container_name: capsulet-api
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      CAPSULET_DATABASE_URL: postgres://capsulet:capsulet@postgres:5432/capsulet
      CAPSULET_API_ADDR: 0.0.0.0:8080
      CAPSULET_SEED_EXAMPLES: "true"
      CAPSULET_EXECUTION_POOLS: mini,large
      CAPSULET_OBJECT_STORAGE_MODE: s3
      CAPSULET_OBJECT_STORAGE_BUCKET: capsulet-artifacts
      CAPSULET_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      CAPSULET_OBJECT_STORAGE_REGION: us-east-1
      CAPSULET_OBJECT_STORAGE_PATH_STYLE: "true"
      CAPSULET_OBJECT_STORAGE_ACCESS_KEY_ID: capsulet
      CAPSULET_OBJECT_STORAGE_SECRET_ACCESS_KEY: capsuletpassword
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: crates/Dockerfile
      args:
        PACKAGE: capsulet-worker
        BIN: capsulet-worker
    container_name: capsulet-worker
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    environment:
      CAPSULET_DATABASE_URL: postgres://capsulet:capsulet@postgres:5432/capsulet
      CAPSULET_WORKER_ID: worker-compose
      CAPSULET_WORKER_LOOP: "true"
      CAPSULET_WORKER_POLL_SECONDS: "2"
      CAPSULET_RUNNER_MODE: process
      CAPSULET_STUB_RUNNER_LOGS: |
        Docker Compose stub runner completed the job.
        Capsulet captured this log preview for local smoke testing.
      CAPSULET_STUB_ARTIFACT_TEXT: "Generated by the Docker Compose stub runner."
      SMTP_HOST: smtp
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      SMTP_FROM: capsulet@example.local
      CAPSULET_OBJECT_STORAGE_MODE: s3
      CAPSULET_OBJECT_STORAGE_BUCKET: capsulet-artifacts
      CAPSULET_OBJECT_STORAGE_ENDPOINT: http://minio:9000
      CAPSULET_OBJECT_STORAGE_REGION: us-east-1
      CAPSULET_OBJECT_STORAGE_PATH_STYLE: "true"
      CAPSULET_OBJECT_STORAGE_ACCESS_KEY_ID: capsulet
      CAPSULET_OBJECT_STORAGE_SECRET_ACCESS_KEY: capsuletpassword

  scheduler:
    build:
      context: .
      dockerfile: crates/Dockerfile
      args:
        PACKAGE: capsulet-scheduler
        BIN: capsulet-scheduler
    container_name: capsulet-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      CAPSULET_DATABASE_URL: postgres://capsulet:capsulet@postgres:5432/capsulet
      CAPSULET_SCHEDULER_LOOP: "true"
      CAPSULET_SCHEDULER_POLL_SECONDS: "3"

  evaluator:
    build:
      context: .
      dockerfile: crates/Dockerfile
      args:
        PACKAGE: capsulet-evaluator
        BIN: capsulet-evaluator
    container_name: capsulet-evaluator
    profiles:
      - all

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: capsulet-dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      CAPSULET_DASHBOARD_API_URL: http://api:8080
    ports:
      - "3000:3000"

volumes:
  capsulet-postgres-data:
  capsulet-minio-data:
