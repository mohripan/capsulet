nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  repository: mohripan16/capsulet
  tag: "0.1.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

podAnnotations: {}
podLabels: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

config:
  logLevel: info
  seedExamples: true
  databaseUrlSecret:
    name: ""
    key: DATABASE_URL
  objectStorage:
    mode: s3
    path: /var/lib/capsulet/objects
    bucket: capsulet-artifacts
    endpoint: ""
    region: us-east-1
    pathStyle: true
    credentialsSecret:
      name: ""
      accessKeyKey: access-key-id
      secretKeyKey: secret-access-key
  kafka:
    brokers: ""

postgresql:
  mode: bundled
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    database: capsulet
    username: capsulet
    password: capsulet
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

minio:
  mode: bundled
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    rootUser: capsulet
    rootPassword: capsuletpassword
  bucket: capsulet-artifacts
  region: us-east-1
  pathStyle: true
  service:
    port: 9000
    consolePort: 9001
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  bucketJob:
    enabled: true
    backoffLimit: 6

migrations:
  enabled: true
  backoffLimit: 6

api:
  enabled: true
  replicaCount: 1
  image:
    repositorySuffix: api
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: true
  replicaCount: 1
  image:
    repositorySuffix: worker
  runner:
    mode: kubernetes
    executionNamespace: ""
    logLimitBytes: 65536
    loop: true
    pollSeconds: 5
    stubArtifactText: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

scheduler:
  enabled: true
  replicaCount: 1
  loop: true
  pollSeconds: 5
  image:
    repositorySuffix: scheduler
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi

evaluator:
  enabled: true
  replicaCount: 1
  image:
    repositorySuffix: evaluator
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi

dashboard:
  enabled: true
  replicaCount: 1
  apiBaseUrl: ""
  image:
    repositorySuffix: dashboard
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

executionPools:
  defaultPool: mini
  pools:
    mini:
      description: Lightweight jobs such as email, webhooks, and small scripts
      nodeSelector:
        capsulet.dev/pool: mini
      tolerations: []
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      timeoutSeconds: 120
      maxConcurrentJobs: 50
      ttlSecondsAfterFinished: 300
    large:
      description: Compute-heavy jobs such as model inference and batch processing
      nodeSelector:
        capsulet.dev/pool: large
      tolerations:
        - key: capsulet.dev/pool
          operator: Equal
          value: large
          effect: NoSchedule
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "8"
          memory: 16Gi
      timeoutSeconds: 3600
      maxConcurrentJobs: 10
      ttlSecondsAfterFinished: 300

networkPolicies:
  enabled: false

serviceMonitor:
  enabled: false
