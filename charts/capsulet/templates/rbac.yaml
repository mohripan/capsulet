{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "capsulet.fullname" . }}
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "capsulet.fullname" . }}
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "capsulet.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "capsulet.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
