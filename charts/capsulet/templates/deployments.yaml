{{- $root := . -}}
{{- $components := dict "api" .Values.api "worker" .Values.worker "scheduler" .Values.scheduler "evaluator" .Values.evaluator "dashboard" .Values.dashboard -}}
{{- range $name, $component := $components }}
{{- if $component.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "capsulet.fullname" $root }}-{{ $name }}
  labels:
    {{- include "capsulet.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $component.replicaCount }}
  selector:
    matchLabels:
      {{- include "capsulet.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "capsulet.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $root.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "capsulet.serviceAccountName" $root }}
      securityContext:
        {{- toYaml $root.Values.securityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: {{ include "capsulet.componentImage" (list $root $component) }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          securityContext:
            {{- toYaml $root.Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "capsulet.fullname" $root }}-config
          {{- if and $root.Values.config.databaseUrlSecret.name $root.Values.config.databaseUrlSecret.key }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.config.databaseUrlSecret.name }}
                  key: {{ $root.Values.config.databaseUrlSecret.key }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ dig "service" "targetPort" 8080 $component }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $component.resources | nindent 12 }}
---
{{- end }}
{{- end }}
