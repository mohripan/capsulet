{{- $root := . -}}
{{- $components := dict "api" .Values.api "worker" .Values.worker "scheduler" .Values.scheduler "evaluator" .Values.evaluator "dashboard" .Values.dashboard -}}
{{- range $name, $component := $components }}
{{- if $component.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "capsulet.fullname" $root }}-{{ $name }}
  labels:
    {{- include "capsulet.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  {{- if not (dig "autoscaling" "enabled" false $component) }}
  replicas: {{ $component.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "capsulet.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "capsulet.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $root.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "capsulet.serviceAccountName" $root }}
      securityContext:
        {{- toYaml $root.Values.securityContext | nindent 8 }}
      {{- if or $root.Values.highAvailability.podAntiAffinity.enabled $root.Values.highAvailability.topologySpread.enabled }}
      {{- if $root.Values.highAvailability.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ $root.Values.highAvailability.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "capsulet.selectorLabels" $root | nindent 20 }}
                    app.kubernetes.io/component: {{ $name }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if $root.Values.highAvailability.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $root.Values.highAvailability.topologySpread.maxSkew }}
          topologyKey: {{ $root.Values.highAvailability.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ $root.Values.highAvailability.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "capsulet.selectorLabels" $root | nindent 14 }}
              app.kubernetes.io/component: {{ $name }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "capsulet.componentImage" (list $root $component) }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          securityContext:
            {{- toYaml $root.Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "capsulet.fullname" $root }}-config
          {{- if or (eq $name "api") (eq $name "worker") (eq $name "scheduler") (eq $name "evaluator") }}
          env:
            - name: CAPSULET_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "capsulet.databaseSecretName" $root }}
                  key: {{ include "capsulet.databaseSecretKey" $root }}
            - name: CAPSULET_DB_MAX_CONNECTIONS
              value: {{ $root.Values.config.database.maxConnections | quote }}
            - name: CAPSULET_DB_ACQUIRE_TIMEOUT_SECONDS
              value: {{ $root.Values.config.database.acquireTimeoutSeconds | quote }}
            - name: CAPSULET_DB_STATEMENT_TIMEOUT_SECONDS
              value: {{ $root.Values.config.database.statementTimeoutSeconds | quote }}
            {{- if eq $name "api" }}
            {{- if $root.Values.api.auth.disabled }}
            - name: CAPSULET_AUTH_DISABLED
              value: "true"
            {{- else }}
            - name: CAPSULET_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.api.auth.existingSecret | quote }}
                  key: {{ $root.Values.api.auth.secretKey | quote }}
            {{- end }}
            {{- if $root.Values.api.webhooks.existingSecret }}
            - name: CAPSULET_WEBHOOK_SECRETS
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.api.webhooks.existingSecret | quote }}
                  key: {{ $root.Values.api.webhooks.secretKey | quote }}
            {{- end }}
            {{- end }}
            {{- if eq $name "scheduler" }}
            - name: CAPSULET_SCHEDULER_LOOP
              value: {{ $root.Values.scheduler.loop | quote }}
            - name: CAPSULET_SCHEDULER_POLL_SECONDS
              value: {{ $root.Values.scheduler.pollSeconds | quote }}
            - name: CAPSULET_SCHEDULER_HEALTH_ADDR
              value: "0.0.0.0:8082"
            {{- end }}
            {{- if eq $name "worker" }}
            - name: CAPSULET_RUNNER_MODE
              value: {{ $root.Values.worker.runner.mode | quote }}
            - name: CAPSULET_EXECUTION_NAMESPACE
              value: {{ default $root.Release.Namespace $root.Values.worker.runner.executionNamespace | quote }}
            - name: CAPSULET_LOG_LIMIT_BYTES
              value: {{ $root.Values.worker.runner.logLimitBytes | quote }}
            - name: CAPSULET_WORKER_LOOP
              value: {{ $root.Values.worker.runner.loop | quote }}
            - name: CAPSULET_WORKER_POLL_SECONDS
              value: {{ $root.Values.worker.runner.pollSeconds | quote }}
            - name: CAPSULET_WORKER_LEASE_SECONDS
              value: {{ $root.Values.worker.runner.leaseSeconds | quote }}
            - name: CAPSULET_WORKER_HEALTH_ADDR
              value: "0.0.0.0:8081"
            - name: CAPSULET_EXECUTION_POOLS_FILE
              value: /etc/capsulet/execution-pools.yaml
            - name: CAPSULET_EXECUTION_SERVICE_ACCOUNT
              value: {{ default (printf "%s-execution" (include "capsulet.fullname" $root)) $root.Values.executionIsolation.serviceAccountName | quote }}
            {{- if $root.Values.executionIsolation.runtimeClassName }}
            - name: CAPSULET_EXECUTION_RUNTIME_CLASS
              value: {{ $root.Values.executionIsolation.runtimeClassName | quote }}
            {{- end }}
            {{- if $root.Values.worker.runner.stubArtifactText }}
            - name: CAPSULET_STUB_ARTIFACT_TEXT
              value: {{ $root.Values.worker.runner.stubArtifactText | quote }}
            {{- end }}
            {{- end }}
            {{- if eq $name "evaluator" }}
            - name: CAPSULET_EVALUATOR_POLL_SECONDS
              value: {{ $root.Values.evaluator.pollSeconds | quote }}
            - name: CAPSULET_EVALUATOR_HEALTH_ADDR
              value: "0.0.0.0:8083"
            - name: CAPSULET_RETENTION_DAYS
              value: {{ $root.Values.evaluator.retentionDays | quote }}
            - name: CAPSULET_AUDIT_RETENTION_DAYS
              value: {{ $root.Values.evaluator.auditRetentionDays | quote }}
            - name: CAPSULET_RETENTION_INTERVAL_SECONDS
              value: {{ $root.Values.evaluator.retentionIntervalSeconds | quote }}
            - name: CAPSULET_EXECUTION_NAMESPACE
              value: {{ default $root.Release.Namespace $root.Values.worker.runner.executionNamespace | quote }}
            - name: CAPSULET_EXECUTION_SERVICE_ACCOUNT
              value: {{ default (printf "%s-execution" (include "capsulet.fullname" $root)) $root.Values.executionIsolation.serviceAccountName | quote }}
            {{- if $root.Values.executionIsolation.runtimeClassName }}
            - name: CAPSULET_EXECUTION_RUNTIME_CLASS
              value: {{ $root.Values.executionIsolation.runtimeClassName | quote }}
            {{- end }}
            {{- if $root.Values.evaluator.sqlConnections.existingSecret }}
            - name: CAPSULET_SQL_CONNECTIONS
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.evaluator.sqlConnections.existingSecret | quote }}
                  key: {{ $root.Values.evaluator.sqlConnections.secretKey | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (include "capsulet.objectStorageMode" $root) "s3" }}
            - name: CAPSULET_OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "capsulet.objectStorageCredentialsSecretName" $root }}
                  key: {{ include "capsulet.objectStorageAccessKeyKey" $root }}
            - name: CAPSULET_OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "capsulet.objectStorageCredentialsSecretName" $root }}
                  key: {{ include "capsulet.objectStorageSecretKeyKey" $root }}
            {{- end }}
          {{- end }}
          {{- if or (eq $name "worker") (eq $name "dashboard") (and (eq $name "api") (eq (include "capsulet.objectStorageMode" $root) "filesystem")) }}
          volumeMounts:
            {{- if eq $name "dashboard" }}
            - name: dashboard-cache
              mountPath: /app/.next/cache
            {{- end }}
            {{- if eq (include "capsulet.objectStorageMode" $root) "filesystem" }}
            - name: object-storage
              mountPath: {{ $root.Values.config.objectStorage.path | quote }}
            {{- end }}
            {{- if eq $name "worker" }}
            - name: execution-pools
              mountPath: /etc/capsulet
              readOnly: true
            {{- end }}
          {{- end }}
          {{- if or (eq $name "api") (eq $name "dashboard") }}
          ports:
            - name: http
              containerPort: {{ dig "service" "targetPort" 8080 $component }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: {{ ternary "/readyz" "/healthz" (eq $name "api") }}
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: {{ ternary "/readyz" "/healthz" (eq $name "api") }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ ternary "/livez" "/healthz" (eq $name "api") }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- end }}
          {{- if or (eq $name "worker") (eq $name "scheduler") (eq $name "evaluator") }}
          ports:
            - name: health
              containerPort: {{ ternary 8081 (ternary 8082 8083 (eq $name "scheduler")) (eq $name "worker") }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /readyz
              port: health
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- end }}
          resources:
            {{- toYaml $component.resources | nindent 12 }}
      {{- if or (eq $name "worker") (eq $name "dashboard") (and (eq $name "api") (eq (include "capsulet.objectStorageMode" $root) "filesystem")) }}
      volumes:
        {{- if eq $name "dashboard" }}
        - name: dashboard-cache
          emptyDir: {}
        {{- end }}
        {{- if eq (include "capsulet.objectStorageMode" $root) "filesystem" }}
        - name: object-storage
          emptyDir: {}
        {{- end }}
        {{- if eq $name "worker" }}
        - name: execution-pools
          configMap:
            name: {{ include "capsulet.fullname" $root }}-config
            items:
              - key: execution-pools.yaml
                path: execution-pools.yaml
        {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}
