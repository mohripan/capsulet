{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "capsulet.fullname" . }}-migrate
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "capsulet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "capsulet.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "capsulet.componentImage" (list . .Values.api) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "capsulet.fullname" . }}-config
          env:
            - name: CAPSULET_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "capsulet.databaseSecretName" . }}
                  key: {{ include "capsulet.databaseSecretKey" . }}
            - name: CAPSULET_MIGRATE_ONLY
              value: "true"
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
{{- if and (eq .Values.minio.mode "bundled") .Values.minio.bucketJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "capsulet.fullname" . }}-minio-bucket
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-bucket
spec:
  backoffLimit: {{ .Values.minio.bucketJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "capsulet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio-bucket
    spec:
      restartPolicy: OnFailure
      securityContext:
        {{- toYaml .Values.minio.securityContext | nindent 8 }}
      containers:
        - name: create-bucket
          image: {{ printf "%s:%s" .Values.minio.mcImage.repository .Values.minio.mcImage.tag | quote }}
          imagePullPolicy: {{ .Values.minio.mcImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.minio.containerSecurityContext | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            - name: MINIO_ENDPOINT
              value: {{ include "capsulet.objectStorageEndpoint" . | quote }}
            - name: MINIO_BUCKET
              value: {{ include "capsulet.objectStorageBucket" . | quote }}
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "capsulet.minioName" . }}
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "capsulet.minioName" . }}
                  key: root-password
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 2
              done
              mc mb --ignore-existing "local/$MINIO_BUCKET"
{{- end }}
