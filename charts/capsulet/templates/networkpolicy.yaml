{{- if .Values.executionNetworkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "capsulet.fullname" . }}-execution-default-deny
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      capsulet.dev/managed-by: capsulet
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    {{- if .Values.executionNetworkPolicy.allowDns }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.executionNetworkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
