apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "capsulet.fullname" . }}-test-connection"
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - "{{ include "capsulet.fullname" . }}-api:{{ .Values.api.service.port }}/healthz"
