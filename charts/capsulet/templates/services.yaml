{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "capsulet.fullname" . }}-api
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "capsulet.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
{{- if and .Values.api.enabled .Values.dashboard.enabled }}
---
{{- end }}
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "capsulet.fullname" . }}-dashboard
  labels:
    {{- include "capsulet.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "capsulet.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
