name: Helm

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/capsulet

      - name: Render chart
        run: helm template capsulet charts/capsulet
