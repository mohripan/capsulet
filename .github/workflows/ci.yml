name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: 1.96.0

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.96.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build dashboard
        run: npm run build

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run SDK tests
        run: python -m unittest discover -s tests

  helm:
    name: Helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/capsulet

      - name: Render chart
        run: helm template capsulet charts/capsulet

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: capsulet-api
            dockerfile: crates/Dockerfile
            build-args: |
              PACKAGE=capsulet-api
              BIN=capsulet-api
          - image: capsulet-worker
            dockerfile: crates/Dockerfile
            build-args: |
              PACKAGE=capsulet-worker
              BIN=capsulet-worker
          - image: capsulet-scheduler
            dockerfile: crates/Dockerfile
            build-args: |
              PACKAGE=capsulet-scheduler
              BIN=capsulet-scheduler
          - image: capsulet-evaluator
            dockerfile: crates/Dockerfile
            build-args: |
              PACKAGE=capsulet-evaluator
              BIN=capsulet-evaluator
          - image: capsulet-dashboard
            dockerfile: Dockerfile.dashboard
            build-args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: ${{ matrix.image }}:ci
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
