global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: capsulet-api
    static_configs:
      - targets: ["api:8080"]

  - job_name: capsulet-worker
    static_configs:
      - targets: ["worker:8081"]

  - job_name: capsulet-scheduler
    static_configs:
      - targets: ["scheduler:8082"]

  - job_name: capsulet-evaluator
    static_configs:
      - targets: ["evaluator:8083"]
